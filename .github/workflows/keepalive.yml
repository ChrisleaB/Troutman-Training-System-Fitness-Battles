name: Keep Streamlit and Supabase Alive

on:
  schedule:
    - cron: '0 11,23 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit App
        run: |
          for i in {1..3}; do
            echo "Attempt $i..."
            STATUS=$(curl \
              --silent \
              --show-error \
              --location \
              --max-redirs 5 \
              --max-time 60 \
              --connect-timeout 10 \
              --output /dev/null \
              --write-out "%{http_code}" \
              "https://tts-ultimate-squat-war-2026.streamlit.app")

            echo "HTTP Status: $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "✅ Ping successful!"
              exit 0
            fi

            if [ $i -lt 3 ]; then
              echo "⏳ Retrying in 15 seconds..."
              sleep 15
            fi
          done

          echo "❌ All ping attempts failed"
          exit 1
