name: Keep Streamlit and Supabase Alive

on:
  schedule:
    - cron: '0 11,23 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Streamlit App
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Ping Streamlit with headless browser
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            try {
              await page.goto('https://tts-ultimate-squat-war-2026.streamlit.app', {
                waitUntil: 'networkidle',
                timeout: 120000
              });
              // Wait for Streamlit to fully render (look for the app content)
              await page.waitForTimeout(10000);
              const title = await page.title();
              console.log('✅ Page loaded, title:', title);
            } catch (e) {
              console.error('❌ Failed:', e.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          "
